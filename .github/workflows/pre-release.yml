name: "Deploy Pre-Release/Dev"

on:
  push:
    branches:
      - '**'
      - '!main'

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          echo "NZBDAV_VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT

          GHCR_REPO="ghcr.io/${{ github.repository }}"
          DOCKERHUB_REPO="nzbdav/nzbdav"
          echo "TAGS=${GHCR_REPO}:${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}